description = "Ubuntu 24.04 Noble Numbat base image with buildpacks for Java, Node.js, .NET, Nginx, HTTPD and Procfile"

[build]
  image = "docker.io/paketobuildpacks/ubuntu-noble-build:0.0.50"

[[buildpacks]]
  uri = "docker://docker.io/paketobuildpacks/java-native-image:13.7.0"
  version = "13.7.0"

[[buildpacks]]
  uri = "docker://docker.io/paketobuildpacks/java:21.0.0"
  version = "21.0.0"

[[buildpacks]]
  uri = "docker://docker.io/paketobuildpacks/nodejs:10.0.3"
  version = "10.0.3"

[[buildpacks]]
  uri = "docker://docker.io/paketobuildpacks/dotnet-core:4.0.2"
  version = "4.0.2"

[[buildpacks]]
  uri = "docker://docker.io/paketobuildpacks/procfile:5.12.0"
  version = "5.12.0"

[[buildpacks]]
  uri = "docker://docker.io/paketobuildpacks/web-servers:4.0.2"
  version = "4.0.2"

[lifecycle]
  version = "0.21.1"

[[order]]

  [[order.group]]
    id = "paketo-buildpacks/java-native-image"
    version = "13.7.0"

[[order]]

  [[order.group]]
    id = "paketo-buildpacks/java"
    version = "21.0.0"

[[order]]

  [[order.group]]
    id = "paketo-buildpacks/web-servers"
    version = "4.0.2"

[[order]]

  [[order.group]]
    id = "paketo-buildpacks/nodejs"
    version = "10.0.3"

[[order]]

  [[order.group]]
    id = "paketo-buildpacks/dotnet-core"
    version = "4.0.2"

[[order]]

  [[order.group]]
    id = "paketo-buildpacks/procfile"
    version = "5.12.0"

[run]

  [[run.images]]
    image = "docker.io/paketobuildpacks/ubuntu-noble-run:latest"

[stack]
  id = "io.buildpacks.stacks.noble"

[[targets]]
  arch = "amd64"
  os = "linux"

[[targets]]
  arch = "arm64"
  os = "linux"
