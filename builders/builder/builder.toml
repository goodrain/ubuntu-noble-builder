description = "Ubuntu 24.04 Noble Numbat base image with buildpacks for Java, Node.js and Procfile"

[build]
  image = "docker.io/paketobuildpacks/ubuntu-noble-build:0.0.38"

[[buildpacks]]
  uri = "docker://docker.io/paketobuildpacks/java-native-image:13.1.0"
  version = "13.1.0"

[[buildpacks]]
  uri = "docker://docker.io/paketobuildpacks/java:20.1.0"
  version = "20.1.0"

[[buildpacks]]
  uri = "docker://docker.io/paketobuildpacks/nodejs:9.13.0"
  version = "9.13.0"

[[buildpacks]]
  uri = "docker://docker.io/paketobuildpacks/procfile:5.11.4"
  version = "5.11.4"

[lifecycle]
  version = "0.20.17"

[[order]]

  [[order.group]]
    id = "paketo-buildpacks/java-native-image"
    version = "13.1.0"

[[order]]

  [[order.group]]
    id = "paketo-buildpacks/java"
    version = "20.1.0"

[[order]]

  [[order.group]]
    id = "paketo-buildpacks/nodejs"
    version = "9.13.0"

[[order]]

  [[order.group]]
    id = "paketo-buildpacks/procfile"
    version = "5.11.4"

[run]

  [[run.images]]
    image = "docker.io/paketobuildpacks/ubuntu-noble-run:latest"

[stack]
  id = "io.buildpacks.stacks.noble"

[[targets]]
  arch = "amd64"
  os = "linux"

[[targets]]
  arch = "arm64"
  os = "linux"
