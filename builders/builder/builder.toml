description = "Ubuntu 24.04 Noble Numbat base image with buildpacks for Java, Node.js, .NET, Nginx, HTTPD and Procfile"

[build]
  image = "docker.io/paketobuildpacks/ubuntu-noble-build:0.0.58"

[[buildpacks]]
  uri = "docker://docker.io/paketobuildpacks/java-native-image:14.1.0"
  version = "14.1.0"

[[buildpacks]]
  uri = "docker://docker.io/paketobuildpacks/java:21.2.0"
  version = "21.2.0"

[[buildpacks]]
  uri = "docker://docker.io/paketobuildpacks/nodejs:10.1.0"
  version = "10.1.0"

[[buildpacks]]
  uri = "docker://docker.io/paketobuildpacks/dotnet-core:4.1.0"
  version = "4.1.0"

[[buildpacks]]
  uri = "docker://docker.io/paketobuildpacks/procfile:5.13.0"
  version = "5.13.0"

[[buildpacks]]
  uri = "docker://docker.io/paketobuildpacks/web-servers:4.1.0"
  version = "4.1.0"

[lifecycle]
  version = "0.21.5"

[[order]]

  [[order.group]]
    id = "paketo-buildpacks/java-native-image"
    version = "14.1.0"

[[order]]

  [[order.group]]
    id = "paketo-buildpacks/java"
    version = "21.2.0"

[[order]]

  [[order.group]]
    id = "paketo-buildpacks/web-servers"
    version = "4.1.0"

[[order]]

  [[order.group]]
    id = "paketo-buildpacks/nodejs"
    version = "10.1.0"

[[order]]

  [[order.group]]
    id = "paketo-buildpacks/dotnet-core"
    version = "4.1.0"

[[order]]

  [[order.group]]
    id = "paketo-buildpacks/procfile"
    version = "5.13.0"

[run]

  [[run.images]]
    image = "docker.io/paketobuildpacks/ubuntu-noble-run:latest"

[stack]
  id = "io.buildpacks.stacks.noble"

[[targets]]
  arch = "amd64"
  os = "linux"

[[targets]]
  arch = "arm64"
  os = "linux"
